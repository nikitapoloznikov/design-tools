<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Found — The Garden of Code</title>
<link rel="icon" href="favicon-dark.png" media="(prefers-color-scheme: dark)">
<link rel="icon" href="favicon-light.png" media="(prefers-color-scheme: light)">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,html[data-theme="dark"]{
  --bg:#0a0a0c;
  --surface:#141416;
  --border:#222228;
  --text:#e0e0e0;
  --text2:#888;
  --text3:#555;
  --hover-text:#fff;
  color-scheme:dark;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg:#f6f1eb;
    --surface:#ece5dc;
    --border:#ddd5cb;
    --text:#2a2420;
    --text2:#6b5e53;
    --text3:#a89888;
    --hover-text:#1a1410;
    color-scheme:light;
  }
}
html[data-theme="light"]{
  --bg:#f6f1eb;
  --surface:#ece5dc;
  --border:#ddd5cb;
  --text:#2a2420;
  --text2:#6b5e53;
  --text3:#a89888;
  --hover-text:#1a1410;
  color-scheme:light;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  transition:background 0.35s ease,color 0.35s ease;
}
*{transition-property:color,background,border-color,opacity;transition-duration:0.35s;transition-timing-function:ease}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:28px 0 34px;
  display:flex;
  align-items:flex-start;
  gap:16px;
}
header h1{
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text);
  white-space:nowrap;
}
header a{text-decoration:none;color:inherit}

.theme-toggle{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--surface);
  border-radius:8px;
  padding:2px;
  margin-left:auto;
}
.theme-btn{
  background:none;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  font-family:inherit;
  font-size:11px;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.15s;
}
.theme-btn:hover{color:var(--text2)}
.theme-btn.active{
  background:var(--border);
  color:var(--text);
}

.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
}
.search-field{
  width:160px;
  padding:6px 48px 6px 10px;
  background:var(--surface);
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:12px;
  color:var(--text);
  outline:none;
  transition:width 0.3s, background 0.35s ease, color 0.35s ease;
}
.search-field:focus{
  width:220px;
}
.search-field::placeholder{color:var(--text3)}
.search-shortcut{
  position:absolute;
  right:8px;
  font-size:10px;
  color:var(--text3);
  pointer-events:none;
  display:flex;
  gap:2px;
  transition:opacity 0.15s;
}
.search-shortcut kbd{
  background:var(--border);
  padding:1px 5px;
  border-radius:3px;
  font-family:inherit;
  font-size:9px;
  color:var(--text2);
}

.not-found{
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding-top:4px;
}

@media(max-width:640px){
  header h1{font-size:14px}
  .theme-btn{font-size:13px;padding:6px 10px}
  .search-shortcut{display:none}
}
@media(min-width:2200px){
  .container{max-width:1320px}
  header h1{font-size:19px}
  .search-field{width:192px;padding:7px 58px 7px 12px;font-size:14px;border-radius:10px}
  .search-field:focus{width:264px}
  .search-shortcut{font-size:12px}
  .search-shortcut kbd{font-size:11px;padding:2px 6px}
}
</style>
<script>
(function(){
  var d=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',d);
})();
</script>
</head>
<body>
<div class="container">
  <header>
    <a href="/"><h1>The Garden of Code, Design & Engineering</h1></a>
    <div class="theme-toggle">
      <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-field" id="searchField" placeholder="Search...">
      <div class="search-shortcut" id="searchHint"><kbd>&#8984;</kbd><kbd>F</kbd></div>
    </div>
  </header>
  <div class="not-found">404 — This page doesn't exist in the garden.</div>
</div>
<script>
function setTheme(mode) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === mode));
  document.documentElement.setAttribute('data-theme', mode);
}
document.getElementById('searchField').addEventListener('input', function(e) {
  if (e.target.value) {
    window.location.href = '/?q=' + encodeURIComponent(e.target.value);
  }
});
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchField').focus();
  }
});
</script>
</body>
</html>
