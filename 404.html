<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-X868G1DB3Y"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-X868G1DB3Y');</script>
<title>Not Found — The Garden of Code</title>
<link rel="icon" href="favicon-dark.png" media="(prefers-color-scheme: dark)">
<link rel="icon" href="favicon-light.png" media="(prefers-color-scheme: light)">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,html[data-theme="dark"]{
  --bg:#0a0a0c;
  --surface:#141416;
  --border:#222228;
  --text:#e0e0e0;
  --text2:#888;
  --text3:#555;
  --hover-text:#fff;
  color-scheme:dark;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg:#f6f1eb;
    --surface:#ece5dc;
    --border:#ddd5cb;
    --text:#2a2420;
    --text2:#6b5e53;
    --text3:#a89888;
    --hover-text:#1a1410;
    color-scheme:light;
  }
}
html[data-theme="light"]{
  --bg:#f6f1eb;
  --surface:#ece5dc;
  --border:#ddd5cb;
  --text:#2a2420;
  --text2:#6b5e53;
  --text3:#a89888;
  --hover-text:#1a1410;
  color-scheme:light;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  transition:background 0.35s ease,color 0.35s ease;
}
*{transition-property:color,background,border-color,opacity;transition-duration:0.35s;transition-timing-function:ease}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:28px 0 34px;
  display:flex;
  align-items:flex-start;
  gap:16px;
}
header h1{
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text);
  white-space:nowrap;
}
header a{text-decoration:none;color:inherit}

.theme-toggle{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--surface);
  border-radius:8px;
  padding:2px;
  margin-left:auto;
}
.theme-btn{
  background:none;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  font-family:inherit;
  font-size:11px;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.15s;
}
.theme-btn:hover{color:var(--text2)}
.theme-btn.active{
  background:var(--border);
  color:var(--text);
}

.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
}
.search-field{
  width:160px;
  padding:6px 48px 6px 10px;
  background:var(--surface);
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:12px;
  color:var(--text);
  outline:none;
  transition:width 0.3s, background 0.35s ease, color 0.35s ease;
}
.search-field:focus{
  width:220px;
}
.search-field::placeholder{color:var(--text3)}
.search-shortcut{
  position:absolute;
  right:8px;
  font-size:10px;
  color:var(--text3);
  pointer-events:none;
  display:flex;
  gap:2px;
  transition:opacity 0.15s;
}
.search-shortcut kbd{
  background:var(--border);
  padding:1px 5px;
  border-radius:3px;
  font-family:inherit;
  font-size:9px;
  color:var(--text2);
}

.not-found{
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding-top:4px;
  margin-bottom:14px;
}

.idea{
  display:flex;
  align-items:flex-start;
  gap:8px;
  font-size:13px;
  font-weight:400;
  color:var(--text3);
  padding:28px 0 56px 0;
  line-height:1.5;
  position:relative;
}
#idea{max-width:700px;transition:opacity 0.25s ease}
.gem-wrap{
  position:relative;
  width:38px;
  height:38px;
  flex-shrink:0;
  isolation:isolate;
  background:var(--bg);
  border-radius:3px;
  overflow:hidden;
}
.idea-gem{
  width:38px;
  height:38px;
  flex-shrink:0;
  object-fit:cover;
  border-radius:3px;
  transition:opacity 0.35s ease,transform 0.15s ease;
  position:absolute;
  top:0;
  left:0;
  cursor:pointer;
}
.idea-gem:hover{transform:scale(1.1)}
.idea-gem:active{transform:scale(0.9)}
.gem-dark{mix-blend-mode:screen;opacity:1;filter:contrast(1.4) brightness(1.05) blur(0.02px);pointer-events:auto}
.gem-light{mix-blend-mode:darken;opacity:0;width:53px;height:53px;left:-5px;top:-5px;filter:brightness(1.02);pointer-events:none}
html[data-theme="light"] .gem-dark{opacity:0;pointer-events:none}
html[data-theme="light"] .gem-light{opacity:1;pointer-events:auto}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .gem-dark{opacity:0;pointer-events:none}
  :root:not([data-theme]) .gem-light{opacity:1;pointer-events:auto}
}
.footer-text{
  position:absolute;
  right:0;
  bottom:56px;
  flex-shrink:0;
  mix-blend-mode:difference;
  font-size:12px;
  color:var(--text3);
}

@media(max-width:640px){
  header h1{font-size:14px}
  .theme-btn{font-size:13px;padding:6px 10px}
  .search-shortcut{display:none}
}
@media(min-width:2200px){
  .container{max-width:1320px}
  header h1{font-size:19px}
  .search-field{width:192px;padding:7px 58px 7px 12px;font-size:14px;border-radius:10px}
  .search-field:focus{width:264px}
  .search-shortcut{font-size:12px}
  .search-shortcut kbd{font-size:11px;padding:2px 6px}
}
</style>
<script>
(function(){
  var d=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',d);
})();
</script>
</head>
<body>
<div class="container">
  <header>
    <a href="/"><h1>The Garden of Code, Design & Engineering</h1></a>
    <div class="theme-toggle">
      <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-field" id="searchField" placeholder="Search...">
      <div class="search-shortcut" id="searchHint"><kbd>&#8984;</kbd><kbd>F</kbd></div>
    </div>
  </header>
  <div class="not-found">404 — This page doesn't exist in the garden.</div>
  <div class="idea"><span class="gem-wrap"><video class="idea-gem gem-dark" autoplay loop muted playsinline src="gem.mp4"></video><video class="idea-gem gem-light" autoplay loop muted playsinline src="gem-light.mp4"></video></span><span id="idea"></span><span class="footer-text">Grown by Orlock &middot; 2026</span></div>
</div>
<script>
function setTheme(mode) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === mode));
  document.documentElement.setAttribute('data-theme', mode);
}
document.getElementById('searchField').addEventListener('input', function(e) {
  if (e.target.value) {
    window.location.href = '/?q=' + encodeURIComponent(e.target.value);
  }
});
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchField').focus();
  }
});
var IDEAS=[
"Use Figma + Claude Code to build a browser extension that analyzes any website's spacing system and generates a clean design token file you can drop into your codebase.",
"Combine Spline + Rive + Claude Code to create a 3D product configurator where users rotate, customize, and export assets — deployed as a single-page app with no backend.",
"Use Blender + gltfjsx + Claude Code to build a procedural terrain generator that turns elevation data into an interactive WebGL landscape with flythrough camera controls.",
"Connect ElevenLabs + Claude Code to build a podcast website that auto-generates episode pages with AI voice summaries, waveform visualizers, and chapter markers from RSS.",
"Use Excalidraw + Claude Code to build a whiteboard-to-wireframe tool that converts hand-drawn boxes and arrows into a working HTML prototype with proper CSS grid layout.",
"Build a generative album cover tool with ShaderToy + Suno + Claude Code — enter a genre and mood, get AI-generated music with a matching real-time WebGL visual.",
"Combine Framer + Claude Code to create a personal website that adapts its layout, typography, and color scheme based on the visitor's local time, weather, and device.",
"Build a real-time font pairing tool with Claude Code that takes a headline typeface and instantly generates 10 body font recommendations with live preview and contrast scores.",
"Use Luma AI + Claude Code to build a street-view-style web app for museums — scan galleries with your phone and publish a navigable 3D gaussian splat exhibit online.",
"Use tldraw + Claude Code to create a diagram-to-infrastructure tool — draw your cloud architecture on a whiteboard and generate working Terraform configs from the shapes.",
"Use Spline + Claude Code to build a physics-based portfolio where each project is a 3D object on a table — visitors can grab, toss, and stack them with mouse or touch.",
"Use Blender + Claude Code to create a parametric furniture designer — adjust dimensions with sliders, preview in AR via WebXR, and export manufacturing-ready files.",
];
var ideaEl=document.getElementById('idea');
var lastIdea=-1;
function showIdea(){
  var idx;
  do{idx=Math.floor(Math.random()*IDEAS.length)}while(idx===lastIdea);
  lastIdea=idx;
  ideaEl.textContent=IDEAS[idx];
}
function cycleIdea(){
  ideaEl.style.opacity='0';
  setTimeout(function(){showIdea();ideaEl.style.opacity='1';},250);
}
showIdea();
document.querySelectorAll('.idea-gem').forEach(function(g){g.addEventListener('click',cycleIdea)});
</script>
</body>
</html>
