<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,html[data-theme="dark"]{
  --bg:#0a0a0c;
  --surface:#141416;
  --border:#222228;
  --text:#e0e0e0;
  --text2:#888;
  --text3:#555;
  --radius:10px;
  --hover-text:#fff;
  color-scheme:dark;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg:#f6f1eb;
    --surface:#ece5dc;
    --border:#ddd5cb;
    --text:#2a2420;
    --text2:#6b5e53;
    --text3:#a89888;
    --hover-text:#1a1410;
    color-scheme:light;
  }
}
html[data-theme="light"]{
  --bg:#f6f1eb;
  --surface:#ece5dc;
  --border:#ddd5cb;
  --text:#2a2420;
  --text2:#6b5e53;
  --text3:#a89888;
  --hover-text:#1a1410;
  color-scheme:light;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  transition:background 0.35s ease,color 0.35s ease;
}
*{transition-property:color,background,border-color,opacity,filter,box-shadow;transition-duration:0.35s;transition-timing-function:ease}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* Header */
header{
  padding:28px 0 34px;
  display:flex;
  align-items:flex-start;
  gap:16px;
}
header h1{
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text);
  white-space:nowrap;
}
.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
}
.search-field{
  width:160px;
  padding:6px 48px 6px 10px;
  background:var(--surface);
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:12px;
  color:var(--text);
  outline:none;
  transition:width 0.3s, background 0.35s ease, color 0.35s ease;
}
.search-field:focus{
  width:220px;
}
.search-field::placeholder{color:var(--text3)}
.search-shortcut{
  position:absolute;
  right:8px;
  font-size:10px;
  color:var(--text3);
  pointer-events:none;
  display:flex;
  gap:2px;
  transition:opacity 0.15s;
}
.search-shortcut kbd{
  background:var(--border);
  padding:1px 5px;
  border-radius:3px;
  font-family:inherit;
  font-size:9px;
  color:var(--text2);
}
/* Dimmed state for non-matching tools */
.tool-card{
  transition:opacity 0.25s ease;
}
.tool-card.dimmed{
  opacity:0.12;
  pointer-events:none;
}
.category.all-dimmed .category-title{
  opacity:0.12;
  transition:opacity 0.25s ease;
}

/* Idea generator */
.idea{
  display:flex;
  align-items:flex-start;
  gap:8px;
  font-size:13px;
  font-weight:400;
  color:var(--text3);
  padding:28px 0 56px 0;
  line-height:1.5;
  position:relative;
}
#idea{max-width:700px}
.gem-wrap{
  position:relative;
  width:38px;
  height:38px;
  flex-shrink:0;
  isolation:isolate;
  background:var(--bg);
  border-radius:3px;
  overflow:hidden;
}
.idea-gem{
  width:38px;
  height:38px;
  flex-shrink:0;
  object-fit:cover;
  border-radius:3px;
  transition:opacity 0.35s ease;
  position:absolute;
  top:0;
  left:0;
}
.gem-dark{mix-blend-mode:screen;opacity:1;filter:contrast(1.4) brightness(1.05) blur(0.02px);top:0;left:0;pointer-events:auto}
.gem-light{mix-blend-mode:darken;opacity:0;width:53px;height:53px;left:-5px;top:-5px;filter:brightness(1.02);pointer-events:none}
html[data-theme="light"] .gem-dark{opacity:0;pointer-events:none}
html[data-theme="light"] .gem-light{opacity:1;pointer-events:auto}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .gem-dark{opacity:0;pointer-events:none}
  :root:not([data-theme]) .gem-light{opacity:1;pointer-events:auto}
}
.idea-gem{cursor:pointer;transition:opacity 0.35s ease,transform 0.15s ease}
.idea-gem:hover{transform:scale(1.1)}
.idea-gem:active{transform:scale(0.9)}
#idea{transition:opacity 0.25s ease}
html[data-theme="light"] .gem-dark{opacity:0}
html[data-theme="light"] .gem-light{opacity:1}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .gem-dark{opacity:0}
  :root:not([data-theme]) .gem-light{opacity:1}
}
#idea{}

/* Category row */
.category{
  display:flex;
  gap:0;
  padding:0;
  margin-bottom:14px;
}
.category-title{
  width:140px;
  flex-shrink:0;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding-top:4px;
  margin:0;
}

/* Tools inline flow */
.tools-grid{
  display:flex;
  flex-wrap:wrap;
  gap:1px 14px;
  flex:1;
  align-items:center;
}

.tool-card{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:2px 0;
  text-decoration:none;
  color:var(--text2);
  transition:color 0.1s, opacity 0.25s ease;
}
.tool-card:hover{color:var(--hover-text)}

/* Tooltip (desktop only) */
.tooltip{
  position:fixed;
  pointer-events:none;
  opacity:0;
  z-index:1000;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 13px;
  max-width:320px;
  font-size:13px;
  line-height:1.5;
  color:var(--text2);
  transition:opacity 0.15s ease;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.tooltip.visible{opacity:1}
.tooltip .tt-icon{
  width:32px;
  height:32px;
  border-radius:6px;
  flex-shrink:0;
  object-fit:contain;
  margin-top:1px;
}
.tooltip .tt-icon.invert-dark{
  filter:invert(1) brightness(2);
}
html[data-theme="light"] .tooltip .tt-icon.invert-dark{
  filter:none;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .tooltip .tt-icon.invert-dark{ filter:none; }
}
.tooltip .tt-icon.invert-light{
  filter:none;
}
html[data-theme="light"] .tooltip .tt-icon.invert-light{
  filter:invert(1) brightness(2);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .tooltip .tt-icon.invert-light{ filter:invert(1) brightness(2); }
}
.tooltip .tt-body{flex:1;min-width:0}
.tooltip .tt-desc{color:var(--text);display:block;margin-bottom:12px}
.tooltip .tt-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tooltip .tt-open{margin-left:auto;display:flex;gap:5px}
.tooltip .tt-open kbd{
  background:var(--border);padding:2px 7px;border-radius:4px;font-family:inherit;font-size:10px;color:var(--text3);
}
.tooltip .tt-open .shimmer{
  background:linear-gradient(90deg,#b197fc,#4dabf7,#f06595,#b197fc);
  background-size:200% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:shimmer 1.2s linear infinite;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.tooltip .tt-badge{
  font-size:10px;
  color:var(--text2);
  background:var(--border);
  border-radius:4px;
  padding:2px 7px;
  white-space:nowrap;
}

.tool-favicon{
  width:14px;
  height:14px;
  border-radius:2px;
  flex-shrink:0;
  object-fit:contain;
  opacity:0;
  transition:opacity 0.6s ease,filter 0.35s ease;
}
.tool-favicon.invert-dark{
  filter:invert(1) brightness(2);
}
html[data-theme="light"] .tool-favicon.invert-dark{
  filter:none;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .tool-favicon.invert-dark{ filter:none; }
}
.tool-favicon.invert-light{
  filter:none;
}
html[data-theme="light"] .tool-favicon.invert-light{
  filter:invert(1) brightness(2);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .tool-favicon.invert-light{ filter:invert(1) brightness(2); }
}

.tool-name{
  font-size:13px;
  font-weight:400;
  opacity:0;
  transition:opacity 0.6s ease;
}


/* Theme toggle */
.theme-toggle{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--surface);
  border-radius:8px;
  padding:2px;
  margin-left:auto;
}
.theme-btn{
  background:none;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  font-family:inherit;
  font-size:11px;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.15s;
}
.theme-btn:hover{color:var(--text2)}
.theme-btn.active{
  background:var(--border);
  color:var(--text);
}

/* Footer */
.footer-text{
  position:absolute;
  right:0;
  bottom:56px;
  flex-shrink:0;
  font-size:13px;
  font-weight:400;
  line-height:1.5;
  color:var(--text3);
}

/* Section hover dimming (desktop only) */
@media(min-width:641px){
  main .category{
    transition:opacity 0.3s ease;
  }
  main.has-hover .category{
    opacity:0.15;
  }
  main.has-hover .category.hovered{
    opacity:1;
  }
}

/* Scale up 20% for large displays (2560×1440+) */
@media(min-width:2200px){
  .container{max-width:1320px}
  header h1{font-size:19px}
  .search-field{width:192px;padding:7px 58px 7px 12px;font-size:14px;border-radius:10px}
  .search-field:focus{width:264px}
  .search-shortcut{font-size:12px}
  .search-shortcut kbd{font-size:11px;padding:2px 6px}
  .category{margin-bottom:17px}
  .category-title{width:168px;font-size:14px}
  .tools-grid{gap:1px 17px}
  .tool-card{gap:6px;padding:3px 0}
  .tool-favicon{width:17px;height:17px}
  .tool-name{font-size:16px}
  .theme-btn{font-size:13px;padding:6px 10px}
  header{padding:34px 0 41px;gap:19px}
}

/* Effect canvas — fixed to bottom of viewport on desktop, relative on mobile */
.shader-wrap{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:38vh;
  pointer-events:none;
  z-index:0;
}
.shader-wrap canvas{
  display:block;
  width:100%;
  height:100%;
}
.container{position:relative}

/* Shader glow — CSS handles both themes */
.shader-wrap{mix-blend-mode:screen;filter:blur(4px);transition:none}
html[data-theme="light"] .shader-wrap{
  mix-blend-mode:multiply;
  filter:blur(4px) invert(1) hue-rotate(180deg) saturate(1.4) contrast(1.3);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) .shader-wrap{
    mix-blend-mode:multiply;
    filter:blur(4px) invert(1) hue-rotate(180deg) saturate(1.4) contrast(1.3);
  }
}

@media(max-width:640px){
  .container{padding:0 20px}
  header{flex-wrap:wrap;gap:10px;padding:20px 0 24px}
  header h1{width:100%;margin-bottom:4px;font-size:18px;white-space:normal}
  .theme-toggle{order:2;margin-left:0;flex-shrink:0}
  .search-wrap{order:1;flex:1}
  .search-field{width:100%;font-size:15px;padding:10px 14px;border-radius:10px}
  .search-field:focus{width:100%}
  .search-shortcut{display:none}
  .theme-btn{font-size:14px;padding:8px 12px;border-radius:8px}
  .category{flex-direction:column;gap:6px;margin-bottom:18px}
  .category-title{width:auto;font-size:15px}
  .tools-grid{gap:3px 16px}
  .tool-card{gap:6px;padding:3px 0}
  .tool-favicon{width:18px;height:18px}
  .tool-name{font-size:16px}
  .idea{flex-wrap:wrap;padding:28px 0 0 0}
  .footer-text{position:static;display:block;width:100%;margin-top:12px;padding-bottom:0;mix-blend-mode:normal}
  .shader-wrap{position:relative;bottom:auto;height:15vh;margin-top:0}
}
@media(max-width:390px){
  header h1{font-size:16px}
}
</style>
<script>
// Set theme instantly to avoid white flash
(function(){
  var d=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',d);
})();
</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"The Garden of Code","url":"https://thegardencode.com/","description":"A handpicked toolkit for code, design and engineering: AI agents, dev tools, interfaces, visuals, motion, 3D, audio and more."}</script>

  <main id="main"></main>
  <noscript>

    <li><a href="https://stitch.withgoogle.com/">Stitch</a> — Google's AI-powered design tool for creating and iterating on visual designs.</li>

// Some sites block Google's favicon service — use direct favicon URLs
const DIRECT_FAVICONS = {
  'aider.chat': 'https://aider.chat/assets/icons/favicon-32x32.png',
  'viewer.needle.tools': 'https://needle.tools/favicon.ico',
  'cmux.com': 'https://cmux.com/icon.png',
  'figma.com': 'https://static.figma.com/app/icon/1/favicon.svg',
  'www.figma.com': 'https://static.figma.com/app/icon/1/favicon.svg',
};

// Sites with broken favicons — show first letter on a neutral background
const LETTER_FAVICONS = new Set([
  'www.shadertoy.com','bitspace.sh','jakearchibald.github.io'
]);

function makeLetterFavicon(name) {
  const letter = name.charAt(0).toUpperCase();
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" rx="12" fill="%23888"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="36" font-weight="600">${letter}</text></svg>`)}`;
}

function getFaviconUrl(url, name) {
  try {
    const u = new URL(url);
    if (LETTER_FAVICONS.has(u.hostname)) return makeLetterFavicon(name || u.hostname);
    if (DIRECT_FAVICONS[u.hostname]) return DIRECT_FAVICONS[u.hostname];
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch { return ''; }
}

// Favicons that are dark/black — need inverting in dark mode
const DARK_FAVICONS = new Set([
  'godly.website','www.bezi.com','splice.com','zed.dev',
  'www.hudsandguis.com','interfaceingame.com','www.clo3d.com',
  'www.depthkit.tv','museapp.com','tldraw.com','github.com',
  'www.sidefx.com','derivative.ca',
  'www.fmod.com','localsend.org','arc.net',
  'cables.gl','www.tldraw.com','excalidraw.com',
  'motion-primitives.com','www.fancycomponents.dev','lumalabs.ai',
  'mobbin.com','www.unrealengine.com',
  'v0.dev',
  'threejs.org',
  'www.framer.com',
  'www.designspells.com',
  'penpot.app',
  'mcpmarket.com',
]);

// Favicons that are truly white/light — need inverting in light mode only
const LIGHT_FAVICONS = new Set([
  'www.are.na',
]);

function render() {
  TOOLS.forEach(s => s.tools.sort((a,b) => a.name.localeCompare(b.name, undefined, {sensitivity:'base'})));
  const main = document.getElementById('main');
  main.innerHTML = TOOLS.map(section => `
    <div class="category" id="${section.cat.toLowerCase().replace(/\s+/g,'-')}" style="opacity:0;transition:opacity 0.45s ease">
      <h2 class="category-title">${section.cat}</h2>
      <div class="tools-grid">
        ${section.tools.map(t => {
          let host = '';
          try { host = new URL(t.url).hostname; } catch {}
          const cls = (DARK_FAVICONS.has(host) && !LETTER_FAVICONS.has(host)) ? ' invert-dark' : LIGHT_FAVICONS.has(host) ? ' invert-light' : '';
          const mcp = t.m ? ' · MCP' : '';
          return `<a class="tool-card" href="${t.url}" target="_blank" rel="noopener" data-d="${t.d}" data-p="${t.p}${mcp}">
            <img class="tool-favicon${cls}" src="${getFaviconUrl(t.url, t.name)}" alt="" loading="lazy" onload="this.style.opacity='1'">
            <span class="tool-name">${t.name}</span>
          </a>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

render();
requestAnimationFrame(()=>{requestAnimationFrame(()=>{
  let delay = 0;
  // 1. Header
  document.querySelector('header').style.opacity='1';
  delay += 90;
  // 2. Each category staggered
  document.querySelectorAll('.category').forEach(cat => {
    setTimeout(()=>{
      cat.style.opacity='1';
      cat.querySelectorAll('.tool-name').forEach(n=>n.style.opacity='1');
    }, delay);
    delay += 45;
  });
  // 3. Idea generator + footer (text only, gems load later)
  setTimeout(()=>{ document.querySelector('.idea').style.opacity='1'; }, delay);
  // 4. Load gems after content is visible
  setTimeout(()=>{
    const dark = document.querySelector('.gem-dark');
    const light = document.querySelector('.gem-light');
    dark.src = 'gem.mp4';
    light.src = 'gem-light.mp4';
    dark.addEventListener('canplay', ()=>{ document.querySelector('.gem-wrap').style.opacity='1'; }, {once:true});
  }, delay + 50);
  // 5. Shader — last
  setTimeout(()=>{ document.getElementById('shaderWrap').style.opacity='1'; }, delay + 200);
})});

document.addEventListener('mousedown', e => {
  const sf = document.getElementById('searchField');
  if (sf.value && !e.target.closest('.search-wrap')) {
    sf.value = '';
    onSearch('');
    sf.blur();
  }
});

document.addEventListener('keydown', e => {
  const sf = document.getElementById('searchField');
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    if (document.activeElement === sf) {
      sf.value = '';
      onSearch('');
      sf.blur();
    } else {
      sf.focus();
    }
    return;
  }
  if (e.key === 'Enter' && document.activeElement === sf) {
    const visible = document.querySelectorAll('.tool-card:not(.dimmed)');
    if (visible.length === 1) {
      window.open(visible[0].href, '_blank');
      sf.value = '';
      onSearch('');
      sf.blur();
    }
    return;
  }
  if (e.key === 'Escape') {
    sf.value = '';
    onSearch('');
    sf.blur();
    return;
  }
  // Auto-focus search on any printable key
  if (e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey && document.activeElement !== sf) {
    sf.focus();
  }
});

// Tooltip (desktop only)
var showTooltipForCard = null;
var hideTooltip = null;
var _tipLocked = false;
if (window.matchMedia('(min-width:641px)').matches) {
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  document.body.appendChild(tip);
  let timer = null;

  showTooltipForCard = function(card, showOpen) {
    if (!card || !card.dataset.d) return;
    clearTimeout(timer);
    const badges = card.dataset.p.split(' · ').map(b => `<span class="tt-badge">${b}</span>`).join('');
    const openHint = showOpen ? '<span class="tt-open"><kbd><span class="shimmer" style="display:inline-block;transform:translate(2px,3px)">&#x21B5;</span></kbd><kbd><span class="shimmer">Open</span></kbd></span>' : '';
    const faviconImg = card.querySelector('.tool-favicon');
    const faviconVisible = faviconImg && faviconImg.style.display !== 'none' && faviconImg.src;
    const invertCls = faviconImg && faviconImg.classList.contains('invert-dark') ? ' invert-dark' : faviconImg && faviconImg.classList.contains('invert-light') ? ' invert-light' : '';
    const iconHtml = faviconVisible ? `<img class="tt-icon${invertCls}" src="${faviconImg.src}" alt="">` : '';
    tip.innerHTML = `${iconHtml}<div class="tt-body"><span class="tt-desc">${card.dataset.d}</span><span class="tt-meta">${badges}${openHint}</span></div>`;
    const r = card.getBoundingClientRect();
    tip.style.left = r.left + 'px';
    tip.style.top = (r.bottom + 6) + 'px';
    tip.classList.add('visible');
    requestAnimationFrame(() => {
      const tr = tip.getBoundingClientRect();
      if (tr.right > window.innerWidth - 12) tip.style.left = (window.innerWidth - tr.width - 12) + 'px';
      if (tr.bottom > window.innerHeight - 12) { tip.style.top = (r.top - tr.height - 6) + 'px'; }
    });
  };

  hideTooltip = function() {
    clearTimeout(timer);
    tip.classList.remove('visible');
  };

  document.addEventListener('mouseover', e => {
    if (_tipLocked) return;
    const card = e.target.closest('.tool-card');
    if (!card || !card.dataset.d) { hideTooltip(); return; }
    clearTimeout(timer);
    timer = setTimeout(() => showTooltipForCard(card), 400);
  });

  document.addEventListener('mouseout', e => {
    if (_tipLocked) return;
    const card = e.target.closest('.tool-card');
    if (card) hideTooltip();
  });
}




var _searchTipTimer = null;
function onSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.category').forEach(cat => {
    const catName = cat.querySelector('.category-title').textContent.toLowerCase();
    const catMatch = q && catName.includes(q);
    const cards = cat.querySelectorAll('.tool-card');
    let anyVisible = false;
    cards.forEach(card => {
      const name = card.querySelector('.tool-name').textContent.toLowerCase();
      const match = !q || name.includes(q) || catMatch;
      card.classList.toggle('dimmed', !match);
      if (match) anyVisible = true;
    });
    cat.classList.toggle('all-dimmed', !anyVisible && !!q);
  });
  const visible = document.querySelectorAll('.tool-card:not(.dimmed)');
  clearTimeout(_searchTipTimer);
  if (q && visible.length === 1) {
    _searchTipTimer = setTimeout(() => {
      if (showTooltipForCard) { showTooltipForCard(visible[0], true); _tipLocked = true; }
    }, 400);
  } else {
    _tipLocked = false;
    if (hideTooltip) hideTooltip();
  }
  document.querySelector('.idea').style.opacity = q ? '0.12' : '';
}

  if (q) {
    var sf = document.getElementById('searchField');
    sf.value = q;
    sf.focus();
    onSearch(q);
    history.replaceState(null, '', '/');
  }
})();

<script>
// ============================
// Raw WebGL — Stripe + Custom Bloom Pipeline
// Zero dependencies. CSS screen blend for theme.
// Deferred to load after content.
// ============================
setTimeout(function(){
(function(){

const canvas = document.getElementById('shaderCanvas');
let gl = canvas.getContext('webgl2', {alpha:true, premultipliedAlpha:true});
if(!gl){console.warn('No WebGL2');return;}
gl.getExtension('EXT_color_buffer_half_float');
gl.getExtension('EXT_color_buffer_float');
const wrap = document.getElementById('shaderWrap');

let seed = Math.random()*100;
window._shaderNewSeed = () => { seed = Math.random()*100; };

// --- Compile helper with error logging ---
function mkProg(vs, fs){
  const p=gl.createProgram();
  [gl.VERTEX_SHADER,gl.FRAGMENT_SHADER].forEach((t,i)=>{
    const s=gl.createShader(t); gl.shaderSource(s,[vs,fs][i]); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error('Shader compile:',gl.getShaderInfoLog(s));
    gl.attachShader(p,s);
  });
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) console.error('Program link:',gl.getProgramInfoLog(p));
  return p;
}

// --- Full-screen quad ---
const quadBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
function drawQuad(){
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// --- FBO helper (half-float for HDR) ---
function mkFBO(w,h){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fb=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  const status=gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  if(status!==gl.FRAMEBUFFER_COMPLETE) console.error('FBO incomplete:',status);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return {fb,tex,w,h};
}

const VS=`#version 300 es
layout(location=0) in vec2 a_pos;out vec2 vUv;
void main(){vUv=a_pos*.5+.5;gl_Position=vec4(a_pos,0,1);}`;

// === GLOW SHADER — the stripe ===
const glowProg = mkProg(VS, `#version 300 es
precision highp float;
in vec2 vUv;out vec4 fragColor;
uniform float u_time,u_seed,u_aspect;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);f=f*f*f*(f*(f*6.-15.)+10.);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}
float fbm(vec2 p){float v=0.,a=.5;mat2 r=mat2(.8,.6,-.6,.8);
  for(int i=0;i<3;i++){v+=a*noise(p);p=r*p*2.;a*=.5;}return v;}

void main(){
  // Early-out: skip expensive noise for pixels above visible glow
  if(vUv.y>.75){fragColor=vec4(0,0,0,1);return;}

  float T=u_time,s=u_seed;

  // Palettes
  int idx=int(mod(floor(s*3.7),7.));
  vec3 cCore;
  if(idx==0) cCore=vec3(.85,.95,1.);
  else if(idx==1) cCore=vec3(1.,.85,.95);
  else if(idx==2) cCore=vec3(1.,.95,.8);
  else if(idx==3) cCore=vec3(.9,.85,1.);
  else if(idx==4) cCore=vec3(.8,1.,.95);
  else if(idx==5) cCore=vec3(1.,1.,.9);
  else cCore=vec3(.9,1.,.9);

  vec3 cA,cB;
  if(idx==0){cA=vec3(.85,.12,.5);cB=vec3(.08,.6,.85);}       // magenta → teal
  else if(idx==1){cA=vec3(.95,.65,.1);cB=vec3(.3,.08,.7);}    // amber → violet
  else if(idx==2){cA=vec3(.95,.3,.25);cB=vec3(.06,.15,.55);}  // coral → navy
  else if(idx==3){cA=vec3(.15,.4,1.);cB=vec3(.9,.15,.55);}    // electric blue → hot pink
  else if(idx==4){cA=vec3(.1,.75,.4);cB=vec3(.85,.35,.08);}   // emerald → burnt orange
  else if(idx==5){cA=vec3(.95,.6,.45);cB=vec3(.12,.1,.55);}   // peach → indigo
  else{cA=vec3(.1,.8,.75);cB=vec3(.65,.05,.3);}               // turquoise → ruby

  // Breathing
  float phase=fract(T*.125);
  float breath=smoothstep(0.,.35,phase)-smoothstep(.45,.85,phase);
  float bR=1.+breath*.06,bB=1.+breath*.18;

  // Stripe distance — single wave (CSS blur hides fine detail)
  float wave=fbm(vec2(vUv.x*3.+T*.2+s,T*.15+s))*.025;
  float d=(vUv.y+wave)*15./bR;

  // HDR glow layers
  float core=exp(-d*d*600.)*8.+exp(-d*d*150.)*4.;
  float inner=exp(-d*d*40.)*2.5;
  float mid=exp(-d*d*10.)*1.2;
  float outer=exp(-d*d*3.)*.4;

  // Rays — single FBM layer (CSS blur smooths the rest)
  float rayN=fbm(vec2(vUv.x*48.+T*.35+s,vUv.y*3.));
  float rayMask=smoothstep(0.,.04,d)*smoothstep(.3,.08,d);
  float rays=rayN*rayMask*2.*bB;

  // Horizontal squeeze (no FBM hotspots — CSS blur hides them)
  float hx=(vUv.x-.5)*u_aspect;
  float hBright=.1+.9*exp(-hx*hx*4.8);

  // Two-color gradient with animated noise boundary
  float xn=vUv.x+fbm(vec2(vUv.x*3.+T*.3+s,T*.2))*.18;
  vec3 cBlend=mix(cA,cB,smoothstep(.2,.8,xn));

  // Compose — keep colors pure, no black gaps
  float totalGlow=outer+mid+inner+rays+core;
  // Color blend: weighted by layer, core pushes toward white
  vec3 colTint=cBlend*(outer+mid+inner+rays)+mix(vec3(1.),cCore,.12)*core;
  // Normalize to keep color saturated, then multiply by intensity
  vec3 pureColor=totalGlow>.001 ? colTint/totalGlow : vec3(0.);
  // Boost saturation to avoid washed-out midtones
  float lum=dot(pureColor,vec3(.299,.587,.114));
  pureColor=mix(vec3(lum),pureColor,1.4);
  // Apply intensity
  vec3 col=pureColor*totalGlow;
  col*=bB*hBright;

  // Fade top
  col*=smoothstep(.7,.05,vUv.y);

  fragColor=vec4(col,1.);
}`);

// === BLUR SHADER (separable gaussian 13-tap) ===
const blurProg = mkProg(VS, `#version 300 es
precision highp float;
in vec2 vUv;out vec4 fragColor;
uniform sampler2D u_tex;
uniform vec2 u_dir;
void main(){
  vec2 ts=u_dir;
  vec3 sum=vec3(0.);
  sum+=texture(u_tex,vUv-ts*4.).rgb*.016;
  sum+=texture(u_tex,vUv-ts*3.).rgb*.054;
  sum+=texture(u_tex,vUv-ts*2.).rgb*.121;
  sum+=texture(u_tex,vUv-ts*1.).rgb*.194;
  sum+=texture(u_tex,vUv).rgb*.23;
  sum+=texture(u_tex,vUv+ts*1.).rgb*.194;
  sum+=texture(u_tex,vUv+ts*2.).rgb*.121;
  sum+=texture(u_tex,vUv+ts*3.).rgb*.054;
  sum+=texture(u_tex,vUv+ts*4.).rgb*.016;
  fragColor=vec4(sum,1.);
}`);

// === COMPOSITE SHADER (sharp + bloom + ACES) ===
const compProg = mkProg(VS, `#version 300 es
precision highp float;
in vec2 vUv;out vec4 fragColor;
uniform sampler2D u_sharp,u_bloom;
uniform float u_bloomStr;
void main(){
  vec3 s=texture(u_sharp,vUv).rgb;
  vec3 b=texture(u_bloom,vUv).rgb;
  // Chromatic aberration on bloom
  float ca=.003;
  b.r=texture(u_bloom,vUv+vec2(ca,0.)).r;
  b.b=texture(u_bloom,vUv-vec2(ca,0.)).b;
  vec3 hdr=s+b*u_bloomStr;
  // ACES
  vec3 m=(hdr*(2.51*hdr+.03))/(hdr*(2.43*hdr+.59)+.14);
  fragColor=vec4(m,1.);
}`);

// --- Uniforms ---
const gU={
  time:gl.getUniformLocation(glowProg,'u_time'),
  seed:gl.getUniformLocation(glowProg,'u_seed'),
  aspect:gl.getUniformLocation(glowProg,'u_aspect')
};
const bU={tex:gl.getUniformLocation(blurProg,'u_tex'),dir:gl.getUniformLocation(blurProg,'u_dir')};
const cU={sharp:gl.getUniformLocation(compProg,'u_sharp'),bloom:gl.getUniformLocation(compProg,'u_bloom'),str:gl.getUniformLocation(compProg,'u_bloomStr')};

// --- FBOs ---
let fboFull, fboBloomA, fboBloomB;
let W,H;

function resize(){
  const dpr=Math.min(window.devicePixelRatio,1.5);
  W=Math.round(wrap.clientWidth*dpr);
  H=Math.round(wrap.clientHeight*dpr);
  canvas.width=W; canvas.height=H;
  canvas.style.width=wrap.clientWidth+'px';
  canvas.style.height=wrap.clientHeight+'px';
  fboFull=mkFBO(W,H);
  const bw=Math.round(W/6), bh=Math.round(H/6);
  fboBloomA=mkFBO(bw,bh);
  fboBloomB=mkFBO(bw,bh);
}
resize();
window.addEventListener('resize',resize);

let lastFrame=0;
function frame(t){
  requestAnimationFrame(frame);
  if(t-lastFrame<71) return; // 14fps
  lastFrame=t;
  const T=t*.001;

  // Pass 1: Glow → FBO full
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboFull.fb);
  gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(glowProg);
  gl.uniform1f(gU.time,T);
  gl.uniform1f(gU.seed,seed);
  gl.uniform1f(gU.aspect,W/H);
  drawQuad();

  // Pass 2: Downsample full → bloom A (bilinear filtering = free blur)
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboBloomA.fb);
  gl.viewport(0,0,fboBloomA.w,fboBloomA.h);
  gl.useProgram(blurProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,fboFull.tex);
  gl.uniform1i(bU.tex,0);
  gl.uniform2f(bU.dir,0,0); // no blur, just downsample
  drawQuad();

  // Pass 3: H-blur bloom A → bloom B (wide taps for big bloom)
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboBloomB.fb);
  gl.bindTexture(gl.TEXTURE_2D,fboBloomA.tex);
  gl.uniform2f(bU.dir, 2.5/fboBloomA.w, 0);
  drawQuad();

  // Pass 4: V-blur bloom B → bloom A
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboBloomA.fb);
  gl.bindTexture(gl.TEXTURE_2D,fboBloomB.tex);
  gl.uniform2f(bU.dir, 0, 2.5/fboBloomA.h);
  drawQuad();

  // Pass 5: Composite → screen
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(compProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,fboFull.tex);
  gl.uniform1i(cU.sharp,0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,fboBloomA.tex);
  gl.uniform1i(cU.bloom,1);
  gl.uniform1f(cU.str,1.5);
  drawQuad();
}
requestAnimationFrame(frame);
})();
}, 300);
